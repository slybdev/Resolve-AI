# A generic, single-database configuration.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate the revision hash to 12 chars
truncate_slug_length = 40

# sys.path prepend — allows importing from the app
prepend_sys_path = .

# Timezone for revision timestamps
timezone = UTC

# The sqlalchemy.url is overridden at runtime by env.py
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Lint migrations with ruff after generation
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
