
services:
  # ---------- FastAPI Backend ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xentraldesk-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=mysql+aiomysql://xentraldesk:xentraldesk_dev@mysql:3306/xentraldesk
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./tests:/app/tests
    restart: unless-stopped
    command: /bin/sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  # ---------- MySQL 8.0 ----------
  mysql:
    image: mysql:8.0
    container_name: xentraldesk-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_dev
      MYSQL_DATABASE: xentraldesk
      MYSQL_USER: xentraldesk
      MYSQL_PASSWORD: xentraldesk_dev
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: xentraldesk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
