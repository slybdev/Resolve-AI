
services:
  # ---------- FastAPI Backend ----------
  api:
    build: .
    container_name: resolveai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- MySQL 8.4 ----------
  mysql:
    image: mysql:8.4
    container_name: resolveai-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: resolveai_root
      MYSQL_DATABASE: resolveai
      MYSQL_USER: resolveai
      MYSQL_PASSWORD: resolveai_dev
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: resolveai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
