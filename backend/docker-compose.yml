
services:
  # ---------- FastAPI Backend ----------
  api:
    build: .
    container_name: resolveai-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------- PostgreSQL 16 ----------
  postgres:
    image: postgres:16-alpine
    container_name: resolveai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: resolveai
      POSTGRES_PASSWORD: resolveai_dev
      POSTGRES_DB: resolveai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resolveai"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: resolveai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
