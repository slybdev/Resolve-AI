services:
  # ---------- FastAPI Backend ----------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xentraldesk-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-xentraldesk}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-xentraldesk_dev}
      - POSTGRES_DB=${POSTGRES_DB:-xentraldesk}
      - POSTGRES_HOST=db
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./wait-for-db.sh:/app/wait-for-db.sh
##      - ./uploads:/app/uploads
    restart: unless-stopped
    command: /bin/sh -c "chmod +x /app/wait-for-db.sh && /app/wait-for-db.sh db 5432 $$POSTGRES_USER $$POSTGRES_PASSWORD $$POSTGRES_DB && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xentraldesk-worker
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - PYTHONPATH=/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./uploads:/app/uploads
      - ./wait-for-db.sh:/app/wait-for-db.sh
    restart: unless-stopped
    command: /bin/sh -c "chmod +x /app/wait-for-db.sh && /app/wait-for-db.sh db 5432 $$POSTGRES_USER $$POSTGRES_PASSWORD $$POSTGRES_DB && arq app.worker.WorkerSettings"

  # ---------- PostgreSQL with pgvector ----------
  db:
    image: pgvector/pgvector:pg16
    container_name: xentraldesk-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-xentraldesk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xentraldesk_dev}
      POSTGRES_DB: ${POSTGRES_DB:-xentraldesk}
    ports:
      - "5432:5432"
    volumes:
      - xentral_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------- Redis 7 ----------
  redis:
    image: redis:7-alpine
    container_name: xentraldesk-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

