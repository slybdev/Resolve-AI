server {
    listen 80;
    server_name xentraldesk.com;

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name xentraldesk.com;

    # SSL configuration (Certbot will fill these in or you can provide paths)
    ssl_certificate /etc/letsencrypt/live/xentraldesk.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xentraldesk.com/privkey.pem;

    # Frontend - Static Files
    location / {
        root /var/www/xentraldesk/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
        
        # Caching for assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }
    }

    # Backend API Proxy
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Media/S3 Proxy if not using direct S3 links
    # location /media/ {
    #     proxy_pass http://localhost:9000/;
    # }
}
